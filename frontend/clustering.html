<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clustering Pelanggan</title>

  <link rel="stylesheet" href="css/style.css">

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >
</head>

<body>

<div class="layout">

  <aside class="sidebar">

    <div class="logo">
      <i class="bi bi-bar-chart-line-fill"></i>
      BinaPhoto
    </div>

    <nav class="menu">

      <a href="index.html">
        <i class="bi bi-speedometer2"></i>
        Dashboard
      </a>

      <a href="clustering.html">
        <i class="bi bi-people-fill"></i>
        Clustering Pelanggan
      </a>

      <a href="prediksi.html">
        <i class="bi bi-box-seam"></i>
        Prediksi Stok
      </a>

    </nav>

  </aside>

  <main class="main">

    <div class="header">
      <h1>Clustering Pelanggan</h1>
      <p>Segmentasi pelanggan menggunakan metode K-Means</p>
    </div>

    <div class="table-container">

      <h3>Upload Dataset Pelanggan</h3>

      <br>

      <input
        type="file"
        id="fileCSV"
        accept=".csv"
      >

      <button onclick="uploadCSV()">
        Upload Dataset
      </button>

      <button onclick="jalankanClustering()">
        Jalankan Clustering
      </button>

    </div>

    <div class="table-container">

      <h3>Dataset Pelanggan</h3>

      <br>

      <table>

        <thead>

          <tr>
            <th>Nama Pelanggan</th>
            <th>Total Belanja</th>
            <th>Frekuensi</th>
          </tr>

        </thead>

        <tbody id="datasetTable">

        </tbody>

      </table>

    </div>

    <div class="table-container">

      <h3>Hasil Clustering</h3>

      <br>

      <table>

        <thead>

          <tr>
            <th>Nama</th>
            <th>Total Belanja</th>
            <th>Frekuensi</th>
            <th>Cluster</th>
            <th>Kategori</th>
          </tr>

        </thead>

        <tbody id="clusterTable">

        </tbody>

      </table>

    </div>

  </main>

</div>

<script src="js/clustering.js"></script>

</body>
</html>
