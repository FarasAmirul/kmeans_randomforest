<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Prediksi Stok Barang</title>

  <link rel="stylesheet" href="css/style.css">

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >
</head>

<body>

<div class="layout">

  <aside class="sidebar">

    <div class="logo">
      <i class="bi bi-bar-chart-line-fill"></i>
      BinaPhoto
    </div>

    <nav class="menu">

      <a href="index.html">
        <i class="bi bi-speedometer2"></i>
        Dashboard
      </a>

      <a href="clustering.html">
        <i class="bi bi-people-fill"></i>
        Clustering Pelanggan
      </a>

      <a href="prediksi.html">
        <i class="bi bi-box-seam"></i>
        Prediksi Stok
      </a>

    </nav>

  </aside>

  <main class="main">

    <div class="header">
      <h1>Prediksi Stok Barang</h1>
      <p>Prediksi kebutuhan restok menggunakan Random Forest</p>
    </div>

<div class="table-container">

  <h3>Upload Dataset Barang</h3>

  <br>

  <input
    type="file"
    id="fileBarang"
    accept=".csv"
  >

  <button onclick="uploadBarang()">
    Upload Dataset
  </button>
   <button onclick="jalankanPrediksi()">
        Jalankan Prediksi
      </button>

</div>

    <div class="table-container">

      <h3>Hasil Prediksi</h3>

      <br>

      <table>

        <thead>

          <tr>
            <th>Nama Barang</th>
            <th>Stok</th>
            <th>Penjualan</th>
            <th>Target Stok</th>
            <th>Prediksi</th>
            <th>Status</th>
          </tr>

        </thead>

        <tbody id="prediksiTable">

        </tbody>

      </table>

    </div>

  </main>

</div>

<script src="js/prediksi.js"></script>

</body>
</html>
